services:
  - type: web
    name: therapist-finder-api
    runtime: python
    plan: free
    region: frankfurt
    branch: main
    buildCommand: |
      pip install --upgrade pip poetry
      poetry config virtualenvs.create false
      poetry install --only main --no-root --no-interaction
    startCommand: uvicorn therapist_finder.api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: CORS_ORIGINS
        sync: false
      # Optional: enables the "Generate with AI" button on step 4. Without
      # it the endpoint returns 503 and the frontend shows an inline notice.
      - key: GEMINI_API_KEY
        sync: false
